name: Fix ai6638 domain SEO metadata

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-ai6638-domain-seo.yml

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize domain and SEO metadata
        run: |
          set -euo pipefail
          find . -type f \( -name '*.html' -o -name '*.xml' -o -name '*.txt' -o -name '*.md' -o -name '*.json' -o -name '*.webmanifest' \) \
            -not -path './.git/*' -print0 | xargs -0 perl -pi -e 's#aicz\.shop#ai6638.com#g; s#gptchongzhi\.net#ai6638.com#g'

          # Use an existing image for social previews instead of the missing og-cover.jpg.
          find . -type f -name '*.html' -not -path './.git/*' -print0 | \
            xargs -0 perl -pi -e 's#https://ai6638\.com/images/og-cover\.jpg#https://ai6638.com/images/20251122.jpg#g'

          # The manifest should use root-relative icon paths on ai6638.com.
          perl -pi -e 's#/ai6638\.com/web-app-manifest-#/web-app-manifest-#g' site.webmanifest

          # Search engines need CSS and JS to render pages correctly.
          perl -0pi -e 's/Disallow: \/\*\.js\$\n//g; s/Disallow: \/\*\.css\$\n//g' robots.txt

          rm -f .github/workflows/fix-ai6638-domain-seo.yml
          git add -A

      - name: Commit SEO domain fixes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git diff --cached --quiet && echo 'No changes to commit' && exit 0
          git commit -m 'Fix ai6638.com SEO domain metadata [skip ci]'
          git push
