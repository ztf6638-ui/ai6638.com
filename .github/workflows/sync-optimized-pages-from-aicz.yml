name: Sync optimized pages from aicz.shop

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/sync-optimized-pages-from-aicz.yml

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copy optimized files from aicz.shop repo
        run: |
          set -euo pipefail
          base='https://raw.githubusercontent.com/ztf6638-ui/aicz.shop/main'
          files=(
            index.html
            landing-pages.css
            chatgpt-plus-recharge.html
            claude-pro-recharge.html
            gemini-recharge.html
            grok-recharge.html
            chatgpt-plus-recharge-guide.html
            claude-pro-recharge-guide.html
            gemini-recharge-guide.html
            grok-recharge-guide.html
            guide.html
            faq.html
            blog.html
            comparison.html
            sitemap.xml
            site.webmanifest
            robots.txt
          )
          for file in "${files[@]}"; do
            echo "Fetching $file"
            curl -fsSL "$base/$file" -o "$file"
          done
          # Keep ai6638.com's own custom-domain marker intact for GitHub Pages users.
          printf 'ai6638.com' > CNAME
          rm -f .github/workflows/sync-optimized-pages-from-aicz.yml
          git add -A

      - name: Commit synchronized optimized pages
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git diff --cached --quiet && echo 'No changes to commit' && exit 0
          git commit -m 'Sync optimized landing pages from aicz.shop [skip ci]'
          git push
